version: '3.8'

services:
  frontend:
    build: ./services/frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./services/backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://database:27017
      - ML_URL=http://mlengine:8000
    depends_on:
      - database
      - mlengine
    networks:
      - app-network

  mlengine:
    build: ./services/mlengine
    ports:
      - "8000:8000"
    networks:
      - app-network
    volumes:
      - ./services/mlengine/models:/app/models

  database:
    build: ./services/database
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - app-network
    # NEW: Tell Docker how to check if Mongo is actually ready to receive data
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

    # NEW: The automated seeder container
  db-seed:
    build: ./services/seed
    # Map your local CSV folder into the container so pandas can read them
    volumes:
      - ./data:/app/data
    networks:
      - app-network
    # Wait for the healthcheck to pass before booting
    depends_on:
      database:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  mongodata: